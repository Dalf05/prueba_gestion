{% extends "base.html" %}

{% block header_title %}Nueva Incidencia{% endblock %}
{% block header_subtitle %}REGISTRAR REPORTE EN EL SISTEMA CAMPUS{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto animate-in fade-in duration-500">
    <div class="pro-card p-12 relative overflow-hidden">
        <div class="relative z-10">
            <div class="flex items-center gap-6 mb-12 pb-6 border-b border-slate-100">
                <div class="w-12 h-12 rounded bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-900">
                    <i data-lucide="file-plus" class="w-5 h-5"></i>
                </div>
                <div>
                    <h3 class="text-sm font-bold uppercase tracking-widest text-slate-900">Incident Registration</h3>
                    <p class="font-serif-italic text-xs text-slate-400 mt-1">Formal request for campus technical assistance</p>
                </div>
            </div>

            <form method="post" class="space-y-8">
                {% csrf_token %}
                
                <div class="space-y-2">
                    <label class="micro-label ml-1">Subject Reference</label>
                    <input 
                        type="text" 
                        name="title"
                        required
                        placeholder="Concise technical summary"
                        class="w-full bg-slate-50 border border-slate-100 rounded-lg py-3 px-4 outline-none focus:bg-white focus:border-slate-300 transition-all text-sm font-medium text-slate-700 placeholder:text-slate-300"
                    />
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="micro-label ml-1">Classification Tag</label>
                        <div class="relative">
                            <select 
                                name="category"
                                required
                                class="w-full bg-slate-50 border border-slate-100 rounded-lg py-3 px-4 outline-none focus:bg-white focus:border-slate-300 transition-all text-xs font-bold uppercase tracking-tight text-slate-700 appearance-none cursor-pointer"
                            >
                                <option value="" disabled selected>Select Sector</option>
                                <option value="TI">TI / Technology</option>
                                <option value="INFRAESTRUCTURA">Infrastructure</option>
                                <option value="MOBILIARIO">Furniture</option>
                                <option value="LIMPIEZA">Sanitation</option>
                                <option value="SEGURIDAD">Security</option>
                                <option value="ACADEMICA">Academic Admin</option>
                            </select>
                            <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300 pointer-events-none"></i>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="micro-label ml-1">Location Node</label>
                        <input 
                            type="text" 
                            name="location"
                            required
                            placeholder="Building / Floor / Room"
                            class="w-full bg-slate-50 border border-slate-100 rounded-lg py-3 px-4 outline-none focus:bg-white focus:border-slate-300 transition-all text-sm font-medium text-slate-700 placeholder:text-slate-300"
                        />
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="micro-label ml-1">Technical Brief</label>
                    <textarea 
                        name="description"
                        required
                        rows="6"
                        placeholder="Detailed diagnostics or observer report..."
                        class="w-full bg-slate-50 border border-slate-100 rounded-lg py-4 px-4 outline-none focus:bg-white focus:border-slate-300 transition-all text-sm font-medium text-slate-700 placeholder:text-slate-300 resize-none"
                    ></textarea>
                </div>

                <div class="pt-6 flex flex-col sm:flex-row gap-4">
                    <a href="{% url 'incidents_list' %}" class="flex-1 py-3 text-slate-400 rounded-lg font-bold text-center hover:bg-slate-50 transition-all uppercase tracking-widest text-[10px] border border-transparent hover:border-slate-100">
                        Discard
                    </a>
                    <button 
                        type="submit"
                        class="flex-[2] bg-black text-white rounded-lg py-3 font-bold hover:bg-slate-800 transition-all uppercase tracking-widest text-[10px]"
                    >
                        Index in System
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
